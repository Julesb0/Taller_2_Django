<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud registrada</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #effcf6;
            margin: 0;
            padding: 24px;
        }
        .container {
            max-width: 560px;
            margin: 40px auto;
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        h1 {
            color: #166534;
        }
        p {
            color: #374151;
        }
        a {
            color: #16a34a;
            text-decoration: none;
            font-weight: 600;
            margin: 0 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Solicitud registrada con exito</h1>
        <p>La solicitud fue guardada correctamente.</p>
        <p>
            <a href="{% url 'registro_solicitud' %}">Registrar otra solicitud</a>
            <a href="{% url 'registro_asistencia' %}">Ir a asistencia</a>
        </p>
    </div>
</body>
</html>
