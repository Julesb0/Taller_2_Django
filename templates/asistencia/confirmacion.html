<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmacion asistencia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 24px;
        }
        .card {
            max-width: 560px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        h1 {
            color: #1d4ed8;
            margin-top: 0;
        }
        p {
            color: #334155;
        }
        a {
            text-decoration: none;
            color: #1d4ed8;
            font-weight: 600;
            margin: 0 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Asistencia registrada con exito</h1>
        <p>El registro de asistencia fue guardado correctamente.</p>
        <p>
            <a href="{% url 'registro_asistencia' %}">Registrar otra asistencia</a>
            <a href="{% url 'registro_solicitud' %}">Ir a solicitudes</a>
        </p>
    </div>
</body>
</html>
